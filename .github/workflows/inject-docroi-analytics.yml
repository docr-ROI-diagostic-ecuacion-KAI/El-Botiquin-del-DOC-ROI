name: Inject Doc ROI Analytics

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - index.html
      - docroi-botiquin-analytics.js
      - scripts/inject-docroi-analytics.mjs
      - .github/workflows/inject-docroi-analytics.yml

permissions:
  contents: write

jobs:
  inject:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Inject analytics snippet
        env:
          DOCROI_ANALYTICS_BASE_URL: ${{ vars.DOCROI_ANALYTICS_BASE_URL || 'https://bsc-doc-roi.vercel.app' }}
        run: node scripts/inject-docroi-analytics.mjs
      - name: Commit injected snippet
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Inject Doc ROI analytics snippet"
          git push
